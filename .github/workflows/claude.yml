name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'claude[bot]' &&
      github.actor != 'github-actions[bot]' &&
      contains(github.event.comment.body, '@claude')
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
```

---

### Then test again:
1. Go to **Issues** → open your existing issue
2. Add a **comment** (not a new issue) with:
```
@claude please add a subtract feature to sum.cpp
